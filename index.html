<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paisa — Expense Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f0f; --surface:#181818; --surface2:#222222; --border:#2a2a2a;
    --text:#f0ece4; --muted:#6b6b6b; --accent:#c8a96e; --accent2:#e8d5b0;
    --green:#4caf7d; --green-dim:rgba(76,175,125,0.12); --red:#e05c5c;
    --blue:#5b9bd5; --purple:#9b72cf; --card:#1a1a1a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* ── AUTH SCREENS ── */
  .auth-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:600; transition:opacity 0.3s; }
  .auth-box { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:44px 40px; width:420px; max-width:93vw; display:flex; flex-direction:column; align-items:center; }
  .auth-logo { font-family:'Playfair Display',serif; font-size:2.2rem; color:var(--accent); margin-bottom:4px; }
  .auth-sub { font-size:0.83rem; color:var(--muted); margin-bottom:30px; text-align:center; }
  .auth-icon { font-size:2.2rem; margin-bottom:16px; }
  .auth-tabs { display:flex; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:3px; gap:3px; width:100%; margin-bottom:28px; }
  .auth-tab { flex:1; padding:8px; border-radius:8px; border:none; background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; cursor:pointer; transition:all 0.2s; text-align:center; }
  .auth-tab.active { background:var(--accent); color:var(--bg); font-weight:600; }

  .auth-field { display:flex; flex-direction:column; gap:6px; width:100%; margin-bottom:14px; }
  .auth-field label { font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:500; }
  .auth-field input { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:12px 16px; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:0.92rem; outline:none; transition:border-color 0.2s; width:100%; }
  .auth-field input:focus { border-color:var(--accent); }
  .auth-btn { width:100%; background:var(--accent); color:var(--bg); border:none; padding:13px; border-radius:12px; font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:6px; }
  .auth-btn:hover { background:var(--accent2); transform:translateY(-1px); }
  .auth-btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
  .auth-err { color:var(--red); font-size:0.82rem; margin-top:10px; text-align:center; min-height:18px; }
  .auth-ok { color:var(--green); font-size:0.82rem; margin-top:10px; text-align:center; min-height:18px; }
  .auth-divider { width:100%; border:none; border-top:1px solid var(--border); margin:20px 0; }
  .forgot-link { font-size:0.8rem; color:var(--muted); cursor:pointer; text-align:center; margin-top:10px; text-decoration:underline; transition:color 0.2s; }
  .forgot-link:hover { color:var(--accent); }

  /* ── LOADING ── */
  #loadScreen { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:500; transition:opacity 0.4s; }
  .load-logo { font-family:'Playfair Display',serif; font-size:2.5rem; color:var(--accent); margin-bottom:20px; }
  .load-msg { font-size:0.85rem; color:var(--muted); }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:16px; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ── SYNC ── */
  #syncBar { position:fixed; top:0; left:0; right:0; height:3px; z-index:999; transition:background 0.3s; }
  #syncBar.syncing { background:linear-gradient(90deg,var(--accent),var(--green),var(--accent)); background-size:200%; animation:shimmer 1s infinite; }
  #syncBar.error { background:var(--red); }
  @keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }
  #syncStatus { position:fixed; top:12px; right:16px; z-index:998; display:flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); padding:5px 12px; border-radius:99px; font-size:0.72rem; color:var(--muted); }
  #syncStatus .dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
  #syncStatus.live .dot { background:var(--green); }
  #syncStatus.live { color:var(--green); border-color:#1a3a2a; }
  #syncStatus.syncing .dot { background:var(--accent); animation:pulse 0.8s infinite; }
  #syncStatus.err .dot { background:var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── HEADER ── */
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 32px; border-bottom:1px solid var(--border); position:sticky; top:0; background:rgba(15,15,15,0.95); backdrop-filter:blur(12px); z-index:100; gap:16px; flex-wrap:wrap; }
  .logo { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--accent); letter-spacing:-0.5px; }
  .logo span { color:var(--text); }
  .user-info { display:flex; align-items:center; gap:10px; }
  .user-avatar { width:32px; height:32px; border-radius:50%; background:var(--accent); color:var(--bg); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; flex-shrink:0; }
  .user-email { font-size:0.78rem; color:var(--muted); max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .logout-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:7px 14px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.8rem; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .logout-btn:hover { border-color:var(--red); color:var(--red); }

  .tab-switcher { display:flex; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:4px; gap:4px; }
  .tab-btn { padding:8px 20px; border-radius:9px; border:none; background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:500; cursor:pointer; transition:all 0.2s; }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active.expenses { background:var(--red); color:#fff; }
  .tab-btn.active.received { background:var(--green); color:#fff; }

  .month-nav { display:flex; align-items:center; gap:12px; }
  .month-nav button { background:var(--surface2); border:1px solid var(--border); color:var(--text); width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .month-nav button:hover { background:var(--accent); color:var(--bg); border-color:var(--accent); }
  #currentMonth { font-family:'DM Mono',monospace; font-size:0.9rem; color:var(--accent2); min-width:130px; text-align:center; }

  .add-btn { background:var(--accent); color:var(--bg); border:none; padding:10px 22px; border-radius:10px; font-family:'DM Sans',sans-serif; font-weight:600; font-size:0.9rem; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:8px; white-space:nowrap; }
  .add-btn:hover { background:var(--accent2); transform:translateY(-1px); }
  .add-btn.recv { background:var(--green); color:#fff; }
  .add-btn.recv:hover { background:#5fcf96; }

  /* ── MAIN ── */
  main { max-width:1300px; margin:0 auto; padding:32px 24px; display:grid; grid-template-columns:320px 1fr; gap:28px; }
  .sidebar { display:flex; flex-direction:column; gap:20px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; }
  .card-title { font-family:'Playfair Display',serif; font-size:0.85rem; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:16px; }

  .summary-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .mini-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px 20px; }
  .mini-card.spent { border-color:#2a1a1a; background:linear-gradient(135deg,#1f1010,#1a1a1a); }
  .mini-card.recvd { border-color:#0e2218; background:linear-gradient(135deg,#0f1f16,#1a1a1a); }
  .mini-card.net { border-color:#1a1a28; background:linear-gradient(135deg,#141426,#1a1a1a); grid-column:1/-1; }
  .mini-label { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .mini-amount { font-family:'Playfair Display',serif; font-size:1.6rem; line-height:1; }
  .mini-card.spent .mini-amount { color:var(--red); }
  .mini-card.recvd .mini-amount { color:var(--green); }
  .mini-card.net .mini-amount { font-size:2rem; }
  .mini-sub { font-size:0.72rem; color:var(--muted); margin-top:4px; }

  .pay-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--border); }
  .pay-row:last-child { border-bottom:none; }
  .pay-badge { display:flex; align-items:center; gap:8px; font-size:0.85rem; font-weight:500; }
  .pay-dot { width:8px; height:8px; border-radius:50%; }
  .pay-amount { font-family:'DM Mono',monospace; font-size:0.85rem; color:var(--accent2); }

  .cat-bar-wrap { margin-bottom:12px; }
  .cat-bar-header { display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:6px; }
  .cat-bar-name { color:var(--text); font-weight:500; }
  .cat-bar-amount { font-family:'DM Mono',monospace; color:var(--muted); }
  .cat-bar-track { height:5px; background:var(--surface2); border-radius:99px; overflow:hidden; }
  .cat-bar-fill { height:100%; border-radius:99px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }

  .content { display:flex; flex-direction:column; gap:20px; }
  .filters { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); padding:7px 16px; border-radius:99px; font-size:0.8rem; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s; }
  .filter-btn:hover { border-color:var(--accent); color:var(--accent); }
  .filter-btn.active { background:var(--accent); border-color:var(--accent); color:var(--bg); font-weight:600; }
  .filter-btn.active.ga { background:var(--green); border-color:var(--green); color:#fff; }

  .search-box { margin-left:auto; position:relative; }
  .search-box input { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 16px 8px 36px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.85rem; outline:none; width:200px; transition:all 0.2s; }
  .search-box input:focus { border-color:var(--accent); width:240px; }
  .search-box::before { content:'⌕'; position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:1.1rem; pointer-events:none; }

  .expense-table { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  thead th { padding:14px 20px; text-align:left; font-size:0.72rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); background:var(--surface); }
  tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--surface); }
  td { padding:14px 20px; font-size:0.88rem; vertical-align:middle; }
  .exp-desc { font-weight:500; }
  .exp-note { color:var(--muted); font-size:0.76rem; margin-top:2px; }
  .exp-date { color:var(--muted); font-family:'DM Mono',monospace; font-size:0.78rem; }

  .cat-chip { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:99px; font-size:0.72rem; font-weight:600; background:rgba(255,255,255,0.06); }
  .cat-dot { width:6px; height:6px; border-radius:50%; }
  .pay-chip { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:8px; font-size:0.72rem; font-weight:600; }
  .from-chip { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:8px; font-size:0.75rem; font-weight:500; background:var(--green-dim); color:var(--green); }
  .amt-red { font-family:'DM Mono',monospace; font-weight:600; font-size:0.92rem; color:var(--red); }
  .amt-grn { font-family:'DM Mono',monospace; font-weight:600; font-size:0.92rem; color:var(--green); }

  .row-actions { display:flex; gap:6px; opacity:0; transition:opacity 0.2s; }
  tbody tr:hover .row-actions { opacity:1; }
  .row-actions button { background:var(--surface2); border:1px solid var(--border); color:var(--muted); width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:0.8rem; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .row-actions .del-btn:hover { background:var(--red); color:#fff; border-color:var(--red); }
  .row-actions .edit-btn:hover { background:var(--accent); color:var(--bg); border-color:var(--accent); }

  .empty-state { text-align:center; padding:60px 20px; color:var(--muted); }
  .empty-state .ei { font-size:3rem; margin-bottom:16px; }
  .empty-state p { font-size:0.9rem; }

  /* ── MODALS ── */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(6px); z-index:200; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:32px; width:500px; max-width:95vw; transform:translateY(20px) scale(0.97); transition:all 0.25s cubic-bezier(0.4,0,0.2,1); max-height:90vh; overflow-y:auto; }
  .modal-overlay.open .modal { transform:translateY(0) scale(1); }
  .modal-title { font-family:'Playfair Display',serif; font-size:1.5rem; margin-bottom:24px; }
  .mt-exp { color:var(--accent); } .mt-rec { color:var(--green); }

  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .fg { display:flex; flex-direction:column; gap:6px; }
  .fg.full { grid-column:1/-1; }
  label { font-size:0.78rem; color:var(--muted); font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
  input, select, textarea { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:11px 14px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; width:100%; }
  input:focus, select:focus, textarea:focus { border-color:var(--accent); }
  select option { background:var(--surface2); }
  textarea { resize:vertical; min-height:70px; }
  .aiw { position:relative; }
  .aiw::before { content:'₹'; position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--accent); font-weight:600; pointer-events:none; }
  .aiw input { padding-left:30px; }

  .modal-actions { display:flex; gap:12px; justify-content:flex-end; margin-top:24px; }
  .btn-cancel { background:transparent; border:1px solid var(--border); color:var(--muted); padding:10px 22px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.9rem; cursor:pointer; transition:all 0.2s; }
  .btn-cancel:hover { border-color:var(--muted); color:var(--text); }
  .btn-save { border:none; padding:10px 28px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
  .bs-exp { background:var(--accent); color:var(--bg); }
  .bs-exp:hover { background:var(--accent2); transform:translateY(-1px); }
  .bs-rec { background:var(--green); color:#fff; }
  .bs-rec:hover { background:#5fcf96; transform:translateY(-1px); }

  .toast { position:fixed; bottom:30px; right:30px; background:var(--surface2); border:1px solid var(--border); border-left:3px solid var(--green); padding:14px 20px; border-radius:10px; font-size:0.85rem; z-index:300; transform:translateY(80px); opacity:0; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); }
  .toast.show { transform:translateY(0); opacity:1; }

  @media (hover:none) { .row-actions { opacity:1; } }
  @media (max-width:960px) { main { grid-template-columns:1fr; } header { padding:14px 16px; } .user-email { display:none; } }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen" id="authScreen">
  <div class="auth-box">
    <div class="auth-icon">💰</div>
    <div class="auth-logo">Paisa</div>
    <div class="auth-sub">Your personal expense manager</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabSignIn" onclick="switchAuthTab('signin')">Sign In</button>
      <button class="auth-tab" id="tabSignUp" onclick="switchAuthTab('signup')">Create Account</button>
    </div>

    <!-- SIGN IN -->
    <div id="signInForm" style="width:100%">
      <div class="auth-field"><label>Email</label><input type="email" id="siEmail" placeholder="you@email.com" autocomplete="email"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="siPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doSignIn()"></div>
      <button class="auth-btn" id="signInBtn" onclick="doSignIn()">🔓 Sign In</button>
      <div class="forgot-link" onclick="doForgotPassword()">Forgot password?</div>
      <div class="auth-err" id="siErr"></div>
      <div class="auth-ok" id="siOk"></div>
    </div>

    <!-- SIGN UP -->
    <div id="signUpForm" style="width:100%;display:none">
      <div class="auth-field"><label>Full Name</label><input type="text" id="suName" placeholder="Rahul Sharma"></div>
      <div class="auth-field"><label>Email</label><input type="email" id="suEmail" placeholder="you@email.com" autocomplete="email"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="suPass" placeholder="Min. 6 characters" autocomplete="new-password"></div>
      <div class="auth-field"><label>Confirm Password</label><input type="password" id="suPass2" placeholder="Re-enter password" onkeydown="if(event.key==='Enter')doSignUp()"></div>
      <button class="auth-btn" id="signUpBtn" onclick="doSignUp()">✨ Create Account</button>
      <div class="auth-err" id="suErr"></div>
      <div class="auth-ok" id="suOk"></div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loadScreen" style="display:none">
  <div class="load-logo">Paisa</div>
  <div class="spinner"></div>
  <div class="load-msg">Loading your data…</div>
</div>

<div id="syncBar"></div>
<div id="syncStatus" style="display:none"><div class="dot"></div><span id="syncText">Connecting…</span></div>

<!-- APP -->
<header id="appHeader" style="display:none">
  <div class="logo">Paisa <span>—</span></div>
  <div class="tab-switcher">
    <button class="tab-btn expenses active" onclick="switchTab('expenses')">🔴 Expenses</button>
    <button class="tab-btn received" onclick="switchTab('received')">🟢 Received</button>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="currentMonth"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <button class="add-btn" id="addBtn" onclick="openModal()">＋ <span id="addLabel">Add Expense</span></button>
  <div class="user-info">
    <div class="user-avatar" id="userAvatar">?</div>
    <div class="user-email" id="userEmail"></div>
    <button class="logout-btn" onclick="doLogout()">⎋ Sign out</button>
  </div>
</header>

<main id="appMain" style="display:none">
  <div class="sidebar">
    <div class="summary-row">
      <div class="mini-card spent"><div class="mini-label">Spent</div><div class="mini-amount" id="totalSpent">₹0</div><div class="mini-sub" id="spentCount">0 expenses</div></div>
      <div class="mini-card recvd"><div class="mini-label">Received</div><div class="mini-amount" id="totalRecvd">₹0</div><div class="mini-sub" id="recvdCount">0 entries</div></div>
      <div class="mini-card net"><div class="mini-label">Net Balance</div><div class="mini-amount" id="netAmt">₹0</div><div class="mini-sub" id="netLabel">this month</div></div>
    </div>
    <div class="card"><div class="card-title" id="sPayTitle">By Payment Method</div><div id="payBreakdown"></div></div>
    <div class="card"><div class="card-title" id="sCatTitle">By Category</div><div id="catBreakdown"></div></div>
  </div>
  <div class="content">
    <div class="filters" id="filtersBar"></div>
    <div class="expense-table"><table><thead id="tHead"></thead><tbody id="tBody"></tbody></table></div>
  </div>
</main>

<!-- EXPENSE MODAL -->
<div class="modal-overlay" id="expOverlay" onclick="outerClose(event,'expOverlay')">
  <div class="modal">
    <div class="modal-title mt-exp" id="expTitle">Add Expense</div>
    <div class="form-grid">
      <div class="fg full"><label>Description</label><input type="text" id="fDesc" placeholder="e.g. Electricity bill for March"></div>
      <div class="fg"><label>Amount (₹)</label><div class="aiw"><input type="number" id="fAmt" placeholder="0.00" min="0" step="0.01"></div></div>
      <div class="fg"><label>Date</label><input type="date" id="fDate"></div>
      <div class="fg"><label>Category</label>
        <select id="fCat">
          <option value="Clothing">👗 Clothing</option>
          <option value="Credit Card Bill">💳 Credit Card Bill</option>
          <option value="Electricity Bill">⚡ Electricity Bill</option>

window._doSignIn = async function(){
  const email=document.getElementById('siEmail').value.trim();

  if(!email||!pass){err.textContent='Please enter email and password.';return;}

  try{ await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){
    const msgs={'auth/invalid-credential':'Incorrect email or password.','auth/user-not-found':'No account found.','auth/wrong-password':'Incorrect password.','auth/too-many-requests':'Too many attempts. Try again later.','auth/invalid-email':'Invalid email.'};
    err.textContent=msgs[e.code]||'Login failed. Please try again.';
    btn.textContent='🔓 Sign In'; btn.disabled=false;
  }
};

window._doSignUp = async function(){
  const name=document.getElementById('suName').value.trim();

  const pass=document.getElementById('suPass').value;
  const pass2=document.getElementById('suPass2').value;

  if(!name||!email||!pass){err.textContent='Please fill all fields.';return;}

  if(pass!==pass2){err.textContent='Passwords do not match.';return;}
  btn.textContent='Creating account…'; btn.disabled=true; err.textContent='';
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(cred.user,{displayName:name});
    // save user profile to Firestore
    await setDoc(doc(db,`users/${cred.user.uid}/profile/info`),{name,email,createdAt:new Date().toISOString()});

};

function startListeners(){

  },()=>{setSyncStatus('err','Sync error');document.getElementById('loadScreen').style.display='none';});
  unsubRec=onSnapshot(query(recCol(),orderBy('date','desc')),snap=>{
    received=snap.docs.map(d=>({id:d.id,...d.data()}));
    loadedRec=true; checkLoaded(); if(loadedExp)renderAll();
  },()=>{setSyncStatus('err','Sync error');document.getElementById('loadScreen').style.display='none';});
}

// ── RENDER ───────────────────────────────────────────────────────
function renderAll(){
  const M=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('currentMonth').textContent=M[curDate.getMonth()]+' '+curDate.getFullYear();
  renderSidebar(); tab==='expenses'?renderExpTab():renderRecTab();
}
function renderSidebar(){
  const ed=getMonthExp(),rd=getMonthRec();
  const spent=ed.reduce((s,e)=>s+Number(e.amount),0),recvd=rd.reduce((s,e)=>s+Number(e.amount),0),net=recvd-spent;
  document.getElementById('totalSpent').textContent=fmt(spent);
  document.getElementById('spentCount').textContent=`${ed.length} expense${ed.length!==1?'s':''}`;
  document.getElementById('totalRecvd').textContent=fmt(recvd);
  document.getElementById('recvdCount').textContent=`${rd.length} entr${rd.length!==1?'ies':'y'}`;
  document.getElementById('netAmt').textContent=fmt(Math.abs(net));
  document.getElementById('netAmt').style.color=net>=0?'var(--green)':'var(--red)';
  document.getElementById('netLabel').textContent=net>=0?'surplus this month':'deficit this month';
  if(tab==='expenses'){
    document.getElementById('sPayTitle').textContent='By Payment Method';
    const pt={};ed.forEach(e=>{pt[e.payment]=(pt[e.payment]||0)+Number(e.amount);});
    document.getElementById('payBreakdown').innerHTML=Object.entries(PAYS).map(([n,p])=>`<div class="pay-row"><div class="pay-badge"><div class="pay-dot" style="background:${p.c}"></div>${n}</div><div class="pay-amount">${fmt(pt[n]||0)}</div></div>`).join('');
    document.getElementById('sCatTitle').textContent='By Category';
    const ct={};ed.forEach(e=>{ct[e.category]=(ct[e.category]||0)+Number(e.amount);});
    const sorted=Object.entries(ct).sort((a,b)=>b[1]-a[1]);
    const mx=sorted[0]?sorted[0][1]:1;
    document.getElementById('catBreakdown').innerHTML=sorted.length?sorted.map(([n,a])=>{const c=CATS[n]||CATS['Other'];return`<div class="cat-bar-wrap"><div class="cat-bar-header"><span class="cat-bar-name">${c.i} ${n}</span><span class="cat-bar-amount">${fmt(a)}</span></div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(a/mx*100).toFixed(1)}%;background:${c.c}"></div></div></div>`;}).join(''):'<div style="color:var(--muted);font-size:0.85rem">No expenses this month.</div>';
  } else {
    document.getElementById('sPayTitle').textContent='By Received Via';
    const vt={};rd.forEach(e=>{vt[e.via]=(vt[e.via]||0)+Number(e.amount);});
    document.getElementById('payBreakdown').innerHTML=Object.entries(RVIAS).map(([n,p])=>`<div class="pay-row"><div class="pay-badge"><div class="pay-dot" style="background:${p.c}"></div>${n}</div><div class="pay-amount">${fmt(vt[n]||0)}</div></div>`).join('');
    document.getElementById('sCatTitle').textContent='By Type';
    const tt={};rd.forEach(e=>{tt[e.type]=(tt[e.type]||0)+Number(e.amount);});
    const mx=Math.max(...Object.values(tt),1);
    document.getElementById('catBreakdown').innerHTML=Object.entries(RTYPES).map(([n,c])=>{const a=tt[n]||0;return`<div class="cat-bar-wrap"><div class="cat-bar-header"><span class="cat-bar-name">${c.i} ${n}</span><span class="cat-bar-amount">${fmt(a)}</span></div><div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(a/mx*100).toFixed(1)}%;background:${c.c}"></div></div></div>`;}).join('');
  }
}
function buildFilters(btns){
  return btns.map(b=>`<button class="filter-btn ${filter===b.v?'active'+(b.g?' ga':''):''}" onclick="setFilter('${b.v}')">${b.l}</button>`).join('')+
  `<div class="search-box"><input type="text" id="si" placeholder="Search…" oninput="tab==='expenses'?renderExpTab():renderRecTab()" value="${esc(document.getElementById('si')?.value||'')}"></div>`;
}
function renderExpTab(){
  document.getElementById('filtersBar').innerHTML=buildFilters([{v:'all',l:'All'},{v:'Credit Card',l:'💳 Card'},{v:'Cash',l:'💵 Cash'},{v:'UPI',l:'📱 UPI'}]);
  document.getElementById('tHead').innerHTML='<tr><th>Description</th><th>Category</th><th>Payment</th><th>Date</th><th style="text-align:right">Amount</th><th></th></tr>';
  let data=getMonthExp();
  const s=(document.getElementById('si')?.value||'').toLowerCase();
  if(filter!=='all')data=data.filter(e=>e.payment===filter);
  if(s)data=data.filter(e=>e.desc.toLowerCase().includes(s)||e.category.toLowerCase().includes(s)||(e.notes||'').toLowerCase().includes(s));
  data.sort((a,b)=>b.date.localeCompare(a.date));
  const body=document.getElementById('tBody');
  if(!data.length){body.innerHTML=`<tr><td colspan="6"><div class="empty-state"><div class="ei">🧾</div><p>No expenses found for this period.</p></div></td></tr>`;return;}
  body.innerHTML=data.map(e=>{const cat=CATS[e.category]||CATS['Other'],pay=PAYS[e.payment]||PAYS['UPI'],ds=new Date(e.date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short'});return`<tr><td><div class="exp-desc">${esc(e.desc)}</div>${e.notes?`<div class="exp-note">${esc(e.notes)}</div>`:''}</td><td><span class="cat-chip"><span class="cat-dot" style="background:${cat.c}"></span>${e.category}</span></td><td><span class="pay-chip" style="background:${pay.c}22;color:${pay.c}">${pay.i} ${e.payment}</span></td><td><span class="exp-date">${ds}</span></td><td style="text-align:right"><span class="amt-red">${fmt(e.amount)}</span></td><td><div class="row-actions"><button class="edit-btn" onclick="openEditExp('${e.id}')">✏</button><button class="del-btn" onclick="delExp('${e.id}')">✕</button></div></td></tr>`;}).join('');
}
function renderRecTab(){
  document.getElementById('filtersBar').innerHTML=buildFilters([{v:'all',l:'All',g:true},{v:'Reimbursement',l:'🏢 Reimb.',g:true},{v:'Loan Returned',l:'🤝 Loan',g:true},{v:'Freelance / Work',l:'💼 Freelance',g:true},{v:'Other Income',l:'💰 Other',g:true}]);
  document.getElementById('tHead').innerHTML='<tr><th>Description</th><th>From</th><th>Type</th><th>Via</th><th>Date</th><th style="text-align:right">Amount</th><th></th></tr>';
  let data=getMonthRec();
  const s=(document.getElementById('si')?.value||'').toLowerCase();
  if(filter!=='all')data=data.filter(e=>e.type===filter);
  if(s)data=data.filter(e=>e.desc.toLowerCase().includes(s)||(e.from||'').toLowerCase().includes(s)||e.type.toLowerCase().includes(s)||(e.notes||'').toLowerCase().includes(s));
  data.sort((a,b)=>b.date.localeCompare(a.date));
  const body=document.getElementById('tBody');
  if(!data.length){body.innerHTML=`<tr><td colspan="7"><div class="empty-state"><div class="ei">💸</div><p>No received payments found.</p></div></td></tr>`;return;}
  body.innerHTML=data.map(e=>{const rt=RTYPES[e.type]||RTYPES['Other Income'],rv=RVIAS[e.via]||RVIAS['UPI'],ds=new Date(e.date+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short'});return`<tr><td><div class="exp-desc">${esc(e.desc)}</div>${e.notes?`<div class="exp-note">${esc(e.notes)}</div>`:''}</td><td><span class="from-chip">👤 ${esc(e.from||'—')}</span></td><td><span class="cat-chip"><span class="cat-dot" style="background:${rt.c}"></span>${e.type}</span></td><td><span class="pay-chip" style="background:${rv.c}22;color:${rv.c}">${rv.i} ${e.via}</span></td><td><span class="exp-date">${ds}</span></td><td style="text-align:right"><span class="amt-grn">${fmt(e.amount)}</span></td><td><div class="row-actions"><button class="edit-btn" onclick="openEditRec('${e.id}')">✏</button><button class="del-btn" onclick="delRec('${e.id}')">✕</button></div></td></tr>`;}).join('');
}
window._renderExpTab=renderExpTab;
window._renderRecTab=renderRecTab;
</script>
</body>
</html>
